server:
  port: 8080

spring:
  profiles:
    active: local

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: >
    com.comma.domain.user.model,
    com.comma.domain.survey.model,
    com.comma.domain.diagnosis.model,
    com.comma.domain.place.model,
    com.comma.domain.rest.model,
    com.comma.domain.recommendation.model,
    com.comma.domain.stats.model,
    com.comma.domain.notification.model,
    com.comma.domain.badge.model,
    com.comma.domain.admin.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:comma-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-expiration: 1800000     # 30분 (ms)
  refresh-expiration: 1209600000 # 14일 (ms)

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  front-url: ${APP_FRONT_URL:http://localhost:3000}

claude:
  api:
    key: ${CLAUDE_API_KEY:}
  model: claude-sonnet-4-20250514

logging:
  level:
    com.comma: DEBUG
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
