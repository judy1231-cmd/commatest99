version: '3.8'

# ── AWS 프로덕션용 (RDS + ElastiCache 사용, DB 컨테이너 없음) ──
# 실행: docker-compose -f docker-compose.prod.yml up --build -d
# 필수 환경변수: .env 파일에 설정 (아래 .env.example 참고)

services:

  # ── Spring Boot 백엔드 ─────────────────────────────────────
  backend:
    build: ./backend
    container_name: comma-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_ENDPOINT}:3306/comma_db?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      DB_PASSWORD: ${RDS_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      APP_BASE_URL: https://${DOMAIN}
      APP_FRONT_URL: https://${DOMAIN}
    expose:
      - "8080"

  # ── React 프론트엔드 (Nginx + HTTPS) ──────────────────────
  frontend:
    build: ./frontend
    container_name: comma-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt 인증서 마운트
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
